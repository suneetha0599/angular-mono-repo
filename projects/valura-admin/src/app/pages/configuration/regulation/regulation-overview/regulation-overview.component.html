<div class="regulation-overview bg-white rounded-xl shadow-md p-6 space-y-5">

  <div class="flex flex-col md:flex-row md:items-center md:space-x-4">
    <p class="label-large w-36 mb-1 text-gray-600">Act Name:</p>
    <p class="label-large text-gray-900 mb-1 break-words">{{ regulationDetails?.actName || '-' }}</p>
  </div>

  <div class="flex flex-col md:flex-row md:items-center md:space-x-4">
    <p class="label-large w-36 mb-1 text-gray-600">Jurisdiction:</p>
    <p class="label-large text-gray-900 mb-1">{{ regulationDetails?.jurisdiction || '-' }}</p>
  </div>

  <div class="flex flex-col md:flex-row md:items-center md:space-x-4">
    <p class="label-large w-36 mb-1 text-gray-600">Data Subject Region:</p>
    <p class="label-large text-gray-900 mb-1">{{ regulationDetails?.dataSubjectRegion || '-' }}</p>
  </div>

  <div class="flex flex-col md:flex-row md:items-start md:space-x-4">
    <p class="label-large w-36 mb-1 text-gray-600 md:mt-0">Countries:</p>
    <div class="flex-1 flex flex-wrap gap-2 max-h-64 overflow-y-auto items-center">
      <p *ngFor="let country of regulationDetails?.countries" class="label-large relative px-3 py-2 rounded-xl text-gray-900
                bg-white/30 backdrop-blur-md border border-white/40 shadow-sm">
        {{ country }}
      </p>
    </div>
  </div>
</div>
