<div class="h-full flex flex-col overflow-hidden">
  <div class="flex-1 overflow-auto rounded-lg">
    <ng-container *ngIf="dataSource.filteredData.length > 0; else noData">
      <table mat-table matSort [dataSource]="dataSource"
        class="mat-elevation-z8 w-100 custom-table table table-layout-fixed">
        <ng-container matColumnDef="provision">
          <th mat-header-cell *matHeaderCellDef mat-sort-header style="width:15%">
            Provision
          </th>
          <td mat-cell *matCellDef="let element">
            <span [appEllipsisTooltip]="element.source" [matTooltip]="element.source" (click)="onViewClick(element)">
              {{ element.source }}
            </span>
          </td>
        </ng-container>
        <ng-container matColumnDef="label">
          <th mat-header-cell *matHeaderCellDef mat-sort-header style="width:40%">
            Trigger Point
          </th>
          <td mat-cell *matCellDef="let element">
            <span [appEllipsisTooltip]="element.triggerLabel" [matTooltip]="element.triggerLabel">
              {{ element.triggerLabel }}
            </span>
          </td>
        </ng-container>
        <ng-container matColumnDef="description">
          <th mat-header-cell *matHeaderCellDef mat-sort-header style="width:35%">
            Simplified Trigger Point
          </th>
          <td mat-cell *matCellDef="let element">
            <span [appEllipsisTooltip]="element.name" [matTooltip]="element.name">
              {{ element.name }}
            </span>
          </td>
        </ng-container>
        <ng-container matColumnDef="action">
          <th mat-header-cell *matHeaderCellDef style="width:10%">
            Actions
          </th>
          <td mat-cell *matCellDef="let element">
            <div class="d-flex gap-2">
              <mat-icon (click)="onEditClick(element)" color="primary"
                class="text-primary material-symbols-outlined mat-md-icon cursor-pointer text-grey">edit</mat-icon>
              <mat-icon (click)="onDeleteClick(element)" color="primary"
                class="text-primary material-symbols-outlined mat-md-icon cursor-pointer text-grey">delete</mat-icon>
            </div>
          </td>
        </ng-container>

        <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
        <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
      </table>

    </ng-container>
    <ng-template #noData>
      <div class="flex h-full items-center justify-center">
        <item-not-found [imgHeight]="'200px'" [heading]=errorTitle>
        </item-not-found>
      </div>
    </ng-template>
  </div>
</div>
