<div class="h-full flex flex-col overflow-hidden">
    <div class="flex-1 overflow-auto rounded-lg no-scrollbar p-3">
        @if (initialLoading) {
        <div class="space-y-6">
            @for (i of [1,2,3]; track i) {
            <div class="d-flex justify-between gap-3 items-start p-2">
                <div class="gap-4 w-2/3 justify-between">
                    <div class="bg-gray-200 h-4 w-2/3 rounded mb-2"></div>
                    <div class="bg-gray-200 h-4 w-3/6 rounded mb-2"></div>
                </div>
                <div class="bg-gray-200 h-4 w-1/3 rounded mb-2"></div>
            </div>
            }
        </div>
        }
        @else {

        @if (activityLogVisibility) {
        <div class="flex flex-col gap-6">
            @for (log of activityLogs; track log.id) {
            <div class="flex justify-between items-start">
                <div class="flex flex-col gap-1">
                    <span class="text-sm font-medium text-gray-900">
                        {{ log.user }}
                    </span>
                    <span class="text-sm text-gray-700">
                        {{ log.action }}
                    </span>
                    @if (log.comment) {
                    <span class="text-sm text-gray-500">
                        {{ log.comment }}
                    </span>
                    }
                </div>
                <span class="text-xs text-gray-400 whitespace-nowrap">
                    {{ log.time }}
                </span>
            </div>
            }
        </div>
        } @else {
        <item-not-found [imgHeight]="'200px'" heading="There are no activity records available">
        </item-not-found>
        }
        }
    </div>
</div>
