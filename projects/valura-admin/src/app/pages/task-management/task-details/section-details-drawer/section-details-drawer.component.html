<div class="d-flex flex-column h-100 overflow-hidden">

    <div class="d-flex justify-content-between align-items-center px-4 pt-3">
        <div class="title-medium">Question details</div>
        <button mat-icon-button (click)="close()">
            <mat-icon class="material-symbols-outlined">close</mat-icon>
        </button>
    </div>

    <hr class="my-3">


    <div class="flex-fill d-flex flex-column px-4 min-h-0 overflow-auto">

        <div class="rounded bg-[#F9F9F9]">
            <div class="title-small rounded p-3 bg-[#EEEEEE]">
                {{ questionDetail?.sectionTitle || 'Section' }}
                <span class="border border-primary p-1 bg-white rounded-full text-primary body-small">
                    Question ID : {{ questionDetail?.questionId || requestId }}
                </span>
            </div>
            <hr class="!p-0 !m-0">

            <div class="mx-3 my-2">
                <div class="body-large my-2" [innerHTML]="questionDetail?.questionTitle">
                </div>

                @if (questionDetail?.helperText) {
                <mat-card class="p-4 bg-white shadow-none">
                    <div class="body-large" [innerHTML]="questionDetail.helperText">
                    </div>
                </mat-card>
                }

                <div class="flex justify-end py-3">
                    <div class="body-small text-[#767676]">Responded by: Cameron Williamson•Date: 15/11/2025
                    </div>
                </div>

            </div>
            <div class="py-3">
                <app-discussion-log [requestRid]="requestId" [readOnly]="true"></app-discussion-log>
            </div>


        </div>



    </div>
</div>
