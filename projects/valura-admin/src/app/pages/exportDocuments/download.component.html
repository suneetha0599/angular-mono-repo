<div class="d-flex flex-column view-wrapper h-screen overflow-hidden">
  <div class="p-3 pb-0 flex items-start justify-start">
    <p class="headline-medium my-auto">Report</p>
  </div>
  <div class="p-3 flex-1 overflow-hidden">
    <div class="h-full flex flex-col overflow-hidden bg-white">
      <div class="flex-1 overflow-auto rounded-lg no-scrollbar m-3">
        @if(dataSource.data.length >0){
        <ng-container *ngTemplateOutlet="ngTemplateTable"></ng-container>
        }@else{
        @if(!requestLoading && hasApiError){
        <error-loading-items [imgHeight]="'200px'"></error-loading-items>
        }
        @else if(!requestLoading){
        <ng-template>
          <item-not-found [imgHeight]="'200px'"></item-not-found>
        </ng-template>
        }}
      </div>
    </div>
  </div>

  <ng-template #ngTemplateTable>
    <table mat-table [dataSource]="dataSource" class="mat-elevation-z2 table">
      <ng-container matColumnDef="user">
        <th mat-header-cell *matHeaderCellDef>User</th>
        <td mat-cell *matCellDef="let element">{{element.user}}</td>
      </ng-container>

      <ng-container matColumnDef="timeStamp">
        <th mat-header-cell *matHeaderCellDef>TimeStamp</th>
        <td mat-cell *matCellDef="let element">{{element.timeStamp}}</td>
      </ng-container>

      <ng-container matColumnDef="status">
        <th mat-header-cell *matHeaderCellDef>Status</th>
        <td mat-cell *matCellDef="let element">{{element.status}}</td>
      </ng-container>

      <ng-container matColumnDef="action">
        <th mat-header-cell *matHeaderCellDef> Actions </th>
        <td mat-cell *matCellDef="let row" class="whitespace-nowrap text-primary">
          <loading-button *ngIf="row.status === 'Succeeded'" type="secondary" [loading]="row.loading"
            (onButtonClick)="downloadFile(row)" loadingText="">
            Download
          </loading-button>

          <loading-button *ngIf="row.status !== 'Succeeded'" type="secondary" [loading]="submitLoading"
            [disabled]="true" loadingText="">
            Download
          </loading-button>
        </td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="displayedColumns; sticky: true"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
    </table>
  </ng-template>
</div>
